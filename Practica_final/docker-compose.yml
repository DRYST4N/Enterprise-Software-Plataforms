services:
  backend:
    build: ./Backend
    ports:
      - "3000:3000"
    volumes: 
      - ./Backend:/usr/src/app
    environment: 
      - NODE_ENV=development
    tty: true
    stdin_open: true

  frontend:
    build: ./Frontend       
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/usr/src/app